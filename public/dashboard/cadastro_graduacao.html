    <div class="container">
      <div class="card card-cadastro">
        <h2>Atualize seu Kruang!</h2>
        <div class="formulario">
          <!--

          <div class="campo">
            <span>Kruang:</span>
            <select name="kruang" id="kruang_input">
              <option value="1">Kruang branco</option>
              <option value="2">Kruang branco ponta vermelha</option>

              <option value="6">Kruang azul claro ponta azul escuro</option>
              <option value="7">Kruang azul escuro</option>
              <option value="8">Kruang azul escuro ponta preta</option>
              <option value="9">Kruang preto</option>
            </select>
          </div>
          <div class="campo">
            <span>Equipe:</span>
            <select name="kruang" id="equipe_input">
              <option value="1">Equipe de São Paulo</option>
              <option value="2">Equipe de Minas Gerais</option>
              <option value="3">Equipe do Rio de Janeiro</option>
              <option value="4">Equipe de Santa Catarina</option>
            </select>
          </div>
          <button class="botao" onclick="cadastrar_graduacao()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./../assets/circle-loading.gif" id="loading-gif" />
        </div>

<script>

  function cadastrar_graduacao() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var kruangVar = kruang_input.value;
    var equipeVar = equipe_input.value;
    // var confirmacaoSenhaVar = confirmacao_senha_input.value;
    // var codigoVar = codigo_input.value;
    // var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (
      kruangVar == "" ||
      equipeVar == "" 
      // confirmacaoSenhaVar == "" ||
      // codigoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
      // } else if (senhaVar != confirmacaoSenhaVar) {
      //   cardErro.style.display = "block";
      //   mensagem_erro.innerHTML =
      //     "(Confirmação de senha incorreta)";

      //   finalizarAguardar();
      //   return false;

      //   mensagem_erro.innerHTML =
      //     "(Email inválido)";

      //   finalizarAguardar();
      //   return false;
      // 
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Verificando se o código de ativação é de alguma empresa cadastrada
    /*
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id
        console.log("Código de ativação válido.");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
        finalizarAguardar();
      }
    }
    */

    // Enviando o valor da nova input
    fetch("/graduacao/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        kruangServer: kruangVar,
        equipeServer: equipeVar,
        emailServer: emailVar// ,
        // idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);
        console.log(kruangVar);
        sessionStorage.KRUANG_USUARIO = kruangs[kruangVar - 1]
        console.log(equipeVar);
        sessionStorage.EQUIPE_USUARIO = equipes[equipeVar - 1]

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Informações registradas com sucesso!";

          setTimeout(() => {
            window.location = "dashboard.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          cardErro.style.display = "block"
          // mensagem_erro.innerHTML = "(E-mail já cadastrado no sistema)";
          finalizarAguardar();
          return false;
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });


    return false;
  }
